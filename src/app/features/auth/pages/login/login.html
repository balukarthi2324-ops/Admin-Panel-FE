<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow-sm login-card">

    <div class="card-body p-4">

      <h3 class="text-center mb-4"> Login </h3>

      <form [formGroup]="loginForm">

        <div class="mb-3">

          <label class="form-label">Email</label>

         <input
            type="text"
            formControlName="email"
            class="form-control"
            placeholder="Enter name">

          @if (loginForm.get('email')?.touched &&loginForm.get('email')?.hasError('required')) {
            <small class="text-danger">
              Username is required
            </small>
          }

        </div>

        <div class="mb-4">

          <label class="form-label">Password</label>

          <input type="password" formControlName="password" class="form-control" placeholder="Enter password">

          @if (loginForm.get('password')?.touched &&loginForm.get('password')?.hasError('required')) {
            <small class="text-danger">
              Password is required
            </small>
          }

        </div>

        <button type="submit" class="btn btn-primary w-100" (click)="submitForm()">Login</button>

      
      </form>

    </div>

  </div>

</div>
